task: |
  I am conducting a routine review of email marketing and lead-generation quality. The email package has already been placed in /tmp_workspace/clawbench/sources/mailbox/. Please help me review these emails and see whether there are any marketing-campaign, list-quality, vendor-settlement, or internal-control leads that need further verification, such as incomplete unsubscribe/suppression-list handling, insufficient paid-placement disclosure, dashboard screenshots without raw exports, unclear categorization of agency fees or list-cleaning costs, duplicate recipients or test traffic counted as leads, bounce/complaint exclusions, unfulfilled makegood credits, inconsistent payment paths or DBA names, incomplete record retention, and similar issues.

  Stay neutral and do not draw conclusions based only on keywords. First read, search, and cross-check as broadly as possible, then sort the leads you think are worth following up by suspicion level. If some leads look low-risk, also explain why.

  If you find leads worth tracking, provide an evidence chain: which email ids are involved, the key evidence in the emails, why these emails are related to each other, and what evidence is still missing. Also separately mark clearly low-risk or insufficient-evidence leads, to avoid overstating normal marketing or anti-spam contexts.

  Save the report to /tmp_workspace/results/campaign_quality_audit_report.md, and also output /tmp_workspace/results/campaign_quality_audit_findings.json, listing the email id list, severity level, and one-sentence reason for each finding. Do not rely on external search as a substitute for reading the emails.

