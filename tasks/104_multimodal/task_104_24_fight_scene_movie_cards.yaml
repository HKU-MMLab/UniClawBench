  - references/reference_assets/segment_01.jpg
  - references/reference_assets/segment_02.jpg
  - references/reference_assets/segment_03.jpg
  - references/reference_assets/segment_04.jpg
  - references/reference_assets/segment_05.jpg

codex:
  max_user_followups: 2
