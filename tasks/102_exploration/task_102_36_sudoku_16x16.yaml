  Solve this 16x16 Sudoku puzzle. The puzzle is at:

      /tmp_workspace/clawbench/sources/puzzle.txt

  It is a grid of 16 rows and 16 columns; empty cells are shown as a dot
  (`.`) and given cells hold their value. The rules:
  - Fill every empty cell with a number from 1 to 16.
  - Each row contains 1 to 16 exactly once.
  - Each column contains 1 to 16 exactly once.
  - Each 4x4 box contains 1 to 16 exactly once.
  - The given (pre-filled) numbers must not be changed.

  Save the completed grid to `/tmp_workspace/results/solution.txt` as 16 lines
  of 16 space-separated numbers (no dots), and also save
  `/tmp_workspace/results/solution.json` with a 2D array `solution` (16x16)
  and a short note on your solving approach.

