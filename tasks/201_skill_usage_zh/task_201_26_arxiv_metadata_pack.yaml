task_id: task_201_26_arxiv_metadata_pack
category: 201_skill_usage_zh
agent_sys: openclaw
agent_id: main
model: gpt-5.4
timeout_seconds: 1200
max_total_seconds: 1800
success_threshold: 0.9

recording: none
headed: auto
task: |
  我正在为我们的机器人学读书会准备阅读清单，结果发现有几篇论文被错放进了
  /tmp_workspace/clawbench/sources/arxiv_papers/ 这个文件夹。有些论文的
  标题听起来与机器人学沾边，但实际内容完全是另一个领域，所以光看标题不
  够用。我需要你用工作区的 PDF 解析技能逐一读完每个 PDF，用文档处理技能
  撰写摘要报告，并用 Excel 创建技能生成电子表格。根据实际内容判断哪些
  论文真正是关于机器人学或具身 AI 的，并把那些被错放的论文分到一个
  跑题组里。

  两个输出：
    1. /tmp_workspace/results/metadata.xlsx —— 一个名为 "Papers" 的
       工作表，每篇真正属于机器人学的论文占一行，涵盖 arxiv id、
       标题、主要作者、年份、摘要、页数，以及一条 BibTeX 引用。被错放的
       论文绝不能作为行出现在这个工作表中。
    2. /tmp_workspace/results/summary.md —— 每篇真正属于机器人学的论文
       一个要点，形式为
       "- [arxiv_id] title: 1-sentence takeaway"，后面跟一个明确标注为
       "Excluded" 或 "Off-topic" 的章节，按 arxiv id 列出每一篇被错放的
       论文，并附一行理由解释它为什么不属于机器人学这一组。

references:
  - references/eval_rule.md
  - references/ground_truth.json

sources:
  - arxiv_papers/paper_a3f.pdf
  - arxiv_papers/paper_b9k.pdf
  - arxiv_papers/paper_c1m.pdf
  - arxiv_papers/paper_d7q.pdf
  - arxiv_papers/paper_e2t.pdf
  - arxiv_papers/paper_f5h.pdf
  - arxiv_papers/paper_g8w.pdf
  - arxiv_papers/paper_h2n.pdf
  - arxiv_papers/paper_i6r.pdf
  - arxiv_papers/paper_j4y.pdf
  - arxiv_papers/paper_k7l.pdf
  - arxiv_papers/paper_m9z.pdf

skills:
  - pymupdf-pdf-parser-clawdbot-skill
  - document-pro
  - xlsx-cn

services:
  - name: task-setup
    path: task-setup
    start: bash install.sh
    oneshot: true

codex:
  max_user_followups: 2
