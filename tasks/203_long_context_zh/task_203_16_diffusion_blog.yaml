task: |
  我需要制作一篇关于 Diffusion Models 主题的论文阅读 HTML 博客。我希望开篇以问题驱动的引言开始，从 GAN / VAE / Flow 的局限性出发，引出 diffusion。解释其核心直觉：逐步加噪，再学习一步步去噪。指出其权衡：训练稳定、质量高，但采样慢。
  然后按以下各节展开：
  1. Basic framework
   - 介绍 diffusion probabilistic models、noise-conditioned score networks（NCSN）和 denoising diffusion probabilistic models（DDPM）共同的主线：加噪扰动 + 反向恢复。
  2. Forward and Reverse Diffusion
   - 解释前向过程如何加噪，以及反向过程如何学习去噪并生成样本。
  3. DDPM training objective
   - 解释为什么 DDPM 把目标写成噪声预测，以及为什么这一步很重要。
  4. Score-Based View
   - 用 score function 和 NCSN 解释为什么噪声预测有效。
  5. Quality and stability improvements
   - 涵盖提升质量/稳定性的工作。
  6. Sampling acceleration
   - 涵盖减少采样步数的工作。
  7. Practical deployment
   - 以 Latent Diffusion 等代表性工作收尾，并回答 diffusion 为何真正变得可用。

  候选论文都在 `/tmp_workspace/clawbench/sources/papers/` 中，我把文件重命名成了没有语义的数字，所以不要从文件名猜测。阅读这些论文，并为每一节（包括开篇的问题引言）选出应当讨论的论文。

  让博客图文并茂。你可以从论文中截取图/表，但截图必须完整、清晰、与内容相符，且细节足够清楚到能读出文字和细节。公式可以写成截图或 LaTeX。使用已准备好的 `/tmp_workspace/clawbench/sources/assets/`，其中包含页面模板所需的 CSS、JavaScript 和 MathJax 公式渲染依赖。

  将最终博客保存到 `/tmp_workspace/results/diffusion_blog/`；它应包含 HTML 文件和对应的 assets。把 HTML 引用的图片放到 `/tmp_workspace/clawbench/results/assets/images`，并为博客中的每一张图注明来源论文。

  同时保存 `/tmp_workspace/results/selection_note.md`，说明每一节为什么选择了这些论文。

