references:
  - references/eval_rule.md
  - references/ground_truth.json

sources:
  - airtable_snapshot.json

skills:
  - airtable-pat-rest
  - database-operations

services:
  - name: task-setup
    path: task-setup
    start: bash install.sh
    oneshot: true

pre_exec:
  - ops/populate.py

# Populator audit: Airtable rows are upserted by deterministic deal_id;
# no delete-then-rewrite sequence, no cross-row dependency. Safe under
# workers>1 behind the populator_lock.
pre_exec_parallel_safe: true

codex:
  max_user_followups: 2
