references:
  - references/eval_rule.md
  - references/ground_truth.json

sources:
  - notion_snapshot.json

skills:
  - notion-token-api
  - local-knowledge-consolidator

services:
  - name: task-setup
    path: task-setup
    start: bash install.sh
    oneshot: true

pre_exec:
  - ops/populate.py

# Populator audit: Notion page tree is created-if-absent, then the
# populator writes the snapshot/ground_truth atomically; no partial
# rewrite of live pages. Safe under workers>1 behind the populator_lock.
pre_exec_parallel_safe: true

codex:
  max_user_followups: 2
