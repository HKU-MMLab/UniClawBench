references:
  - references/eval_rule.md
  - references/ground_truth.json

sources:
  - trello_snapshot.json

skills:
  - trello
  - summarize-pro

services:
  - name: task-setup
    path: task-setup
    start: bash install.sh
    oneshot: true

pre_exec:
  - ops/populate.py

# Populator audit: the bootstrap read ("list cards, short-circuit if 25
# already present") plus the idempotent create-missing-only path make
# this populator safe to run under workers>1 behind the populator_lock.
pre_exec_parallel_safe: true

codex:
  max_user_followups: 2
